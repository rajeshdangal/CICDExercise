name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://cicdexercise.onrender.com/health
          max-attempts: 3
          retry-delay: 5s
          retry-all: true
          follow-redirect: false

      - name: Send success notification
        if: success()
        uses: tsickert/discord-webhook@v5.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: |
            ✅ **Health Check Passed!**
            Your application is healthy and responding.
            **Time:** ${{ github.event.schedule }}
            **URL:** https://cicdexercise.onrender.com/health

      - name: Send failure notification
        if: failure()
        uses: tsickert/discord-webhook@v5.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: |
            ❌ **Health Check Failed!**
            Your application is not responding correctly.
            **Time:** ${{ github.event.schedule }}
            **URL:** https://cicdexercise.onrender.com/health
            **Please investigate immediately!**